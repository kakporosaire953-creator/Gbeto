# Configuration Render pour déploiement automatisé
services:
  - type: web
    name: gbeto-api
    env: node
    region: frankfurt
    plan: starter
    buildCommand: "corepack enable && pnpm install && pnpm --filter @gbeto/database db:generate && pnpm --filter @gbeto/api build"
    startCommand: "cd apps/api && pnpm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: gbeto-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gbeto-redis
          type: redis
          property: connectionString
      - key: APP_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENABLE_REGULATED_FLOWS
        value: false

databases:
  - name: gbeto-postgres
    databaseName: gbeto
    plan: starter
    region: frankfurt

  - name: gbeto-redis
    plan: starter
    region: frankfurt
