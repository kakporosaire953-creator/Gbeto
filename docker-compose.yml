services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gbeto
      POSTGRES_USER: gbeto
      POSTGRES_PASSWORD: gbeto
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbeto"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: ["redis-data:/data"]
volumes:
  postgres-data:
  redis-data:
