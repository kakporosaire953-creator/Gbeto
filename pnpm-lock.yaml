lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      prettier:
        specifier: ^3.5.3
        version: 3.5.3
      turbo:
        specifier: ^2.5.4
        version: 2.5.4
      typescript:
        specifier: ^5.8.3
        version: 5.8.3

  apps/api:
    dependencies:
      '@nestjs/common':
        specifier: ^11.1.3
        version: 11.1.3
      '@nestjs/core':
        specifier: ^11.1.3
        version: 11.1.3
      '@nestjs/platform-express':
        specifier: ^11.1.3
        version: 11.1.3
      class-transformer:
        specifier: ^0.5.1
        version: 0.5.1
      class-validator:
        specifier: ^0.14.2
        version: 0.14.2
      helmet:
        specifier: ^8.1.0
        version: 8.1.0
      reflect-metadata:
        specifier: ^0.2.2
        version: 0.2.2
      rxjs:
        specifier: ^7.8.2
        version: 7.8.2
    devDependencies:
      '@nestjs/cli':
        specifier: ^11.0.7
        version: 11.0.7
      '@types/express':
        specifier: ^5.0.3
        version: 5.0.3
      '@types/node':
        specifier: ^22.15.31
        version: 22.15.31
      tsx:
        specifier: ^4.20.3
        version: 4.20.3
      typescript:
        specifier: ^5.8.3
        version: 5.8.3

  apps/web:
