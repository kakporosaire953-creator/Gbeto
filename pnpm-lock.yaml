      '@gbeto/config':
        specifier: workspace:*
        version: link:../../packages/config
      '@tanstack/react-query':
        specifier: ^5.80.7
        version: 5.80.7
      framer-motion:
        specifier: ^12.18.1
        version: 12.18.1
      lucide-react:
        specifier: ^0.515.0
        version: 0.515.0
      next:
        specifier: 15.3.3
        version: 15.3.3
      react:
        specifier: 19.1.0
        version: 19.1.0
      react-dom:
        specifier: 19.1.0
        version: 19.1.0
    devDependencies:
      '@types/node':
        specifier: ^22.15.31
        version: 22.15.31
      '@types/react':
        specifier: ^19.1.8
        version: 19.1.8
      '@types/react-dom':
        specifier: ^19.1.6
        version: 19.1.6
      typescript:
        specifier: ^5.8.3
        version: 5.8.3

  packages/config:
    devDependencies:
      '@types/node':
        specifier: ^22.15.31
        version: 22.15.31
      typescript:
        specifier: ^5.8.3
        version: 5.8.3

  packages/database:
    dependencies:
      '@prisma/client':
        specifier: ^6.9.0
        version: 6.9.0
    devDependencies:
      prisma:
        specifier: ^6.9.0
        version: 6.9.0

packages: {}
